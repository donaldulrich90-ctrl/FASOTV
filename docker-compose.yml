version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fasotv_db}
      POSTGRES_USER: ${DB_USER:-fasotv}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fasotv}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-fasotv.duckdns.org,localhost}
      DJANGO_SETTINGS_MODULE: core.settings
      DB_HOST: db
      DB_NAME: ${DB_NAME:-fasotv_db}
      DB_USER: ${DB_USER:-fasotv}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: ${DB_PORT:-5432}
      REDIS_URL: redis://redis:6379/0
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: ${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-60}
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: ${JWT_REFRESH_TOKEN_LIFETIME_DAYS:-7}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://fasotv.duckdns.org}
      FRONTEND_URL: ${FRONTEND_URL:-https://fasotv.duckdns.org}
      XTREAM_SERVER_URL: ${XTREAM_SERVER_URL:-}
      XTREAM_USERNAME: ${XTREAM_USERNAME:-}
      XTREAM_PASSWORD: ${XTREAM_PASSWORD:-}
      ORANGE_MONEY_MERCHANT_KEY: ${ORANGE_MONEY_MERCHANT_KEY:-}
      ORANGE_MONEY_PIN: ${ORANGE_MONEY_PIN:-}
      ORANGE_MONEY_BASE_URL: ${ORANGE_MONEY_BASE_URL:-https://api.orange.com/orange-money-webpay/bf/v1}
      MOOV_MONEY_BASE_URL: ${MOOV_MONEY_BASE_URL:-}
      MOOV_MONEY_MERCHANT_ID: ${MOOV_MONEY_MERCHANT_ID:-}
      MOOV_MONEY_SECRET: ${MOOV_MONEY_SECRET:-}
      CORIS_MONEY_BASE_URL: ${CORIS_MONEY_BASE_URL:-}
      CORIS_MONEY_MERCHANT_ID: ${CORIS_MONEY_MERCHANT_ID:-}
      CORIS_MONEY_SECRET: ${CORIS_MONEY_SECRET:-}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"

  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      DJANGO_SETTINGS_MODULE: core.settings
      DB_HOST: db
      DB_NAME: ${DB_NAME:-fasotv_db}
      DB_USER: ${DB_USER:-fasotv}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: ${DB_PORT:-5432}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A core worker -l info -c 2

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    restart: unless-stopped
    volumes:
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - backend

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
